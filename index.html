<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Laplace</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Crect%20width='32'%20height='32'%20fill='%23002c82'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,380;8..60,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #002c82;
    --ink: #e7ecf7;
    --ink-quiet: rgba(231, 236, 247, 0.62);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    background-color: var(--bg);
    /* barely-there depth so the field doesn't read as a flat default; center stays #002c82 */
    background-image: radial-gradient(115% 115% at 50% 28%, #01368f 0%, #002c82 58%);
    color: var(--ink);
    font-family: "Source Serif 4", Georgia, "Times New Roman", serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100vh;
    min-height: 100svh;
    display: flex;
    align-items: center;
    justify-content: center;
    /* asymmetric vertical padding nudges the centered block a touch below middle */
    padding: 13vh 7vw 7vh;
  }

  main {
    max-width: 34rem;
    animation: rise 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  p {
    font-weight: 400;
    font-size: clamp(1.28rem, 1rem + 1.35vw, 1.88rem);
    line-height: 1.56;
    letter-spacing: -0.004em;
  }

  p + p { margin-top: 1.7em; }

  .coda {
    color: var(--ink);
    font-weight: 380;
  }

  .follow {
    font-size: clamp(0.98rem, 0.86rem + 0.5vw, 1.18rem);
    line-height: 1.5;
    color: var(--ink-quiet);
  }

  .follow a {
    color: var(--ink);
    text-decoration: none;
    border-bottom: 1px solid rgba(231, 236, 247, 0.35);
    padding-bottom: 1px;
    transition: border-color 0.2s ease, opacity 0.2s ease;
  }

  .follow a:hover,
  .follow a:focus-visible {
    border-bottom-color: var(--ink);
  }

  .follow a:focus-visible {
    outline: 2px solid var(--ink);
    outline-offset: 3px;
    border-radius: 1px;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    main { animation: none; }
  }

  @media (max-width: 600px) {
    body { padding: 11vh 8vw 8vh; }
    p { line-height: 1.5; }
    p + p { margin-top: 1.5em; }
    .follow a { padding-bottom: 2px; }
  }

  /* short landscape phones: keep everything on-screen */
  @media (max-height: 480px) {
    body { padding: 8vh 7vw; }
    p + p { margin-top: 1.3em; }
  }
</style>
</head>
<body>
  <main>
    <p>Laplace is an applied AI research lab working on the future of financial world models. We are a group of researchers, engineers, and technologists inventing at the edge of what&rsquo;s useful and possible.</p>
    <p class="follow">Keep up with the journey by following <a href="https://x.com/arrrrrryaa" target="_blank" rel="noopener">Arya</a> and <a href="https://x.com/brrrrrrucee" target="_blank" rel="noopener">Bruce</a>.</p>
    <p class="coda">We have much to learn, try, and build.</p>
  </main>
</body>
</html>
